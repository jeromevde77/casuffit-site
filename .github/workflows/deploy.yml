name: Deploy to OVH (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ftp-deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer lftp
        run: sudo apt-get install -y lftp

      - name: Déploiement FTP vers OVH
        env:
          FTP_HOST:       ${{ secrets.FTP_HOST }}
          FTP_USER:       ${{ secrets.FTP_USER }}
          FTP_PASSWORD:   ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set ftp:ssl-allow true;
            set ssl:verify-certificate false;
            open -u $FTP_USER,$FTP_PASSWORD ftp://$FTP_HOST;
            mirror --reverse --delete --verbose \
              --exclude .git/ \
              --exclude .github/ \
              --exclude config.php \
              --exclude install.sql \
              --exclude inject_content.sql \
              --exclude migrate_*.sql \
              --exclude cloudflare_*.js \
              --exclude README.md \
              --exclude INSTALL.md \
              --exclude LIRE_MOI_UPLOAD.txt \
              ./ $FTP_SERVER_DIR;
            bye
          "
